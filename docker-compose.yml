services:
  snacks:
    build:
      context: .
      dockerfile: Snacks/Dockerfile
    container_name: snacks
    ## Host networking required for cluster UDP broadcast discovery to reach the LAN.
    network_mode: host
    volumes:
      # Mount your video library directory (read-write for in-place processing)
      - ./video-library:/app/work/uploads
      # Transcoding logs
      - ./data/logs:/app/work/logs
      # Persist settings and database across container updates
      - ./data/config:/app/work/config
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - SNACKS_WORK_DIR=/app/work
      - FFMPEG_PATH=/usr/lib/jellyfin-ffmpeg/ffmpeg
      - FFPROBE_PATH=/usr/lib/jellyfin-ffmpeg/ffprobe
      # Uncomment to run as a non-root user matching your NAS owner. The
      # entrypoint chowns the Snacks-managed paths under /app/work (config,
      # logs, the work-dir lock file) and drops privileges via gosu. The
      # /app/work/uploads and /app/work/output mounts are left alone — the
      # NAS share already enforces its own ownership and recursing into a
      # large NFS/SMB library would hang startup. If /dev/dri is mounted in,
      # the entrypoint also adds the snacks user to that device's actual
      # group so hardware acceleration keeps working.
      # - PUID=1000
      # - PGID=1000
      # Set to skip the startup chown entirely (e.g. host manages all perms).
      # - SNACKS_DISABLE_CHOWN=true
    # GPU passthrough is configured in docker-compose.gpu.yml (Linux NAS only)
    privileged: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # For NVIDIA GPU support (uncomment if using NVIDIA GPU)
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility

